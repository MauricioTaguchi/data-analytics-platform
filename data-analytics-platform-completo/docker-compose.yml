services:
  api:
    build: ./backend
    container_name: analytics-api
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - analytics_uploads:/app/data/uploads
      - analytics_reports:/app/data/reports
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build: ./backend
    container_name: analytics-worker
    env_file:
      - ./backend/.env
    depends_on:
      - db
      - redis
    volumes:
      - ./backend:/app
      - analytics_uploads:/app/data/uploads
      - analytics_reports:/app/data/reports
    command: celery -A app.worker.celery_app worker --loglevel=info

  web:
    build: ./frontend
    container_name: analytics-web
    ports:
      - "5173:5173"
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules

  db:
    image: postgres:16-alpine
    container_name: analytics-db
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: analytics
      POSTGRES_PASSWORD: analytics
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: analytics-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  analytics_uploads:
  analytics_reports:
